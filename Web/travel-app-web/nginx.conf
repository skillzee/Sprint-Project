# ─────────────────────────────────────────────
# nginx config for Angular 19 SPA
#
# The critical part is `try_files $uri $uri/ /index.html`
# WHY? Angular is a Single Page Application — all routing
# happens in the browser using JavaScript. When a user visits
# /flights or /bookings directly (or refreshes the page),
# nginx looks for a file called "flights" or "bookings" which
# doesn't exist. Without this rule, nginx returns 404.
# This rule tells nginx: "if the file doesn't exist, just
# serve index.html and let Angular handle the routing."
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) for 1 year
    # Angular adds content hashes to filenames so cache-busting
    # is automatic — safe to cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — always serve the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}