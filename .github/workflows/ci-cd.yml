name: TravelApp CI/CD

# ──────────────────────────────────────────────
# WHEN does this pipeline run?
# ──────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================
  # JOB 1: Build & Test all .NET backend services
  # ============================================
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TravelApp.slnx

      - name: Build solution
        run: dotnet build TravelApp.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test TravelApp.slnx --no-build --configuration Release --verbosity normal

  # ============================================
  # JOB 2: Build & Test the Angular frontend
  # Runs in parallel with Job 1 — independent
  # ============================================
  frontend-build:
    name: Build Angular Frontend
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js 20 (required for Angular 19)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-path: Web/travel-app-web/package-lock.json

      - name: Install dependencies
        working-directory: Web/travel-app-web
        run: npm ci
        # npm ci is stricter than npm install — uses exact versions
        # from package-lock.json, fails if lock file is out of sync

      # This catches TypeScript errors, missing imports, broken templates
      - name: Build Angular app
        working-directory: Web/travel-app-web
        run: npm run build -- --configuration production

  # ============================================
  # JOB 3: Build & Push ALL Docker Images
  # Waits for BOTH Job 1 AND Job 2 to pass first
  # ============================================
  docker-build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-build]   # Both jobs must pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Backend services ──────────────────────────────────────

      - name: Build & Push Auth Service
        run: |
          docker build -f ./Services/TravelApp.Services.Auth/Dockerfile \
            -t skillzee/travelapp-auth:latest \
            -t skillzee/travelapp-auth:${{ github.sha }} .
          docker push skillzee/travelapp-auth:latest
          docker push skillzee/travelapp-auth:${{ github.sha }}

      - name: Build & Push Booking Service
        run: |
          docker build -f ./Services/TravelApp.Services.Booking/Dockerfile \
            -t skillzee/travelapp-booking:latest \
            -t skillzee/travelapp-booking:${{ github.sha }} .
          docker push skillzee/travelapp-booking:latest
          docker push skillzee/travelapp-booking:${{ github.sha }}

      - name: Build & Push Flight Service
        run: |
          docker build -f ./Services/TravelApp.Services.Flight/Dockerfile \
            -t skillzee/travelapp-flight:latest \
            -t skillzee/travelapp-flight:${{ github.sha }} .
          docker push skillzee/travelapp-flight:latest
          docker push skillzee/travelapp-flight:${{ github.sha }}

      - name: Build & Push Hotel Service
        run: |
          docker build -f ./Services/TravelApp.Services.Hotel/Dockerfile \
            -t skillzee/travelapp-hotel:latest \
            -t skillzee/travelapp-hotel:${{ github.sha }} .
          docker push skillzee/travelapp-hotel:latest
          docker push skillzee/travelapp-hotel:${{ github.sha }}

      - name: Build & Push Trip Service
        run: |
          docker build -f ./Services/TravelApp.Services.Trip/Dockerfile \
            -t skillzee/travelapp-trip:latest \
            -t skillzee/travelapp-trip:${{ github.sha }} .
          docker push skillzee/travelapp-trip:latest
          docker push skillzee/travelapp-trip:${{ github.sha }}

      - name: Build & Push Notification Service
        run: |
          docker build -f ./Services/TravelApp.Services.Notification/Dockerfile \
            -t skillzee/travelapp-notification:latest \
            -t skillzee/travelapp-notification:${{ github.sha }} .
          docker push skillzee/travelapp-notification:latest
          docker push skillzee/travelapp-notification:${{ github.sha }}

      - name: Build & Push Gateway
        run: |
          docker build -f ./Gateway/TravelApp.Gateway/Dockerfile \
            -t skillzee/travelapp-gateway:latest \
            -t skillzee/travelapp-gateway:${{ github.sha }} .
          docker push skillzee/travelapp-gateway:latest
          docker push skillzee/travelapp-gateway:${{ github.sha }}

      # ── Frontend ──────────────────────────────────────────────

      - name: Build & Push Frontend
        run: |
          docker build -f ./Web/travel-app-web/Dockerfile \
            -t skillzee/travelapp-web:latest \
            -t skillzee/travelapp-web:${{ github.sha }} .
          docker push skillzee/travelapp-web:latest
          docker push skillzee/travelapp-web:${{ github.sha }}

      - name: Summary
        run: |
          echo "🚀 All images pushed to Docker Hub!"
          echo ""
          echo "Backend:"
          echo "  skillzee/travelapp-auth:latest"
          echo "  skillzee/travelapp-booking:latest"
          echo "  skillzee/travelapp-flight:latest"
          echo "  skillzee/travelapp-hotel:latest"
          echo "  skillzee/travelapp-trip:latest"
          echo "  skillzee/travelapp-notification:latest"
          echo "  skillzee/travelapp-gateway:latest"
          echo ""
          echo "Frontend:"
          echo "  skillzee/travelapp-web:latest"
          echo ""
          echo "All tagged with commit: ${{ github.sha }}"