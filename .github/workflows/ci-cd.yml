name: TravelApp CI/CD

# ──────────────────────────────────────────────
# WHEN does this pipeline run?
# ──────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]          # Every push to main triggers CI
  pull_request:
    branches: [ "main" ]          # Every PR to main triggers CI

# ──────────────────────────────────────────────
# JOBS — each job runs on a fresh virtual machine
# ──────────────────────────────────────────────
jobs:

  # ============================================
  # JOB 1: Build & Test all .NET services
  # ============================================
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TravelApp.slnx

      - name: Build solution
        run: dotnet build TravelApp.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test TravelApp.slnx --no-build --configuration Release --verbosity normal

  # ============================================
  # JOB 2: Build Docker Images for ALL services
  # Runs only on pushes to main, after tests pass
  # ============================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test           # Only runs if Job 1 passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Each step builds one service image ──
      # The tag uses github.sha (the commit hash) so every
      # image is uniquely identified by the commit that built it.
      # Example tag: travelapp-auth:a3f9c12

      - name: Build Auth Service
        run: docker build -f ./Services/TravelApp.Services.Auth/Dockerfile -t travelapp-auth:${{ github.sha }} .

      - name: Build Booking Service
        run: docker build -f ./Services/TravelApp.Services.Booking/Dockerfile -t travelapp-booking:${{ github.sha }} .

      - name: Build Flight Service
        run: docker build -f ./Services/TravelApp.Services.Flight/Dockerfile -t travelapp-flight:${{ github.sha }} .

      - name: Build Hotel Service
        run: docker build -f ./Services/TravelApp.Services.Hotel/Dockerfile -t travelapp-hotel:${{ github.sha }} .

      - name: Build Trip Service
        run: docker build -f ./Services/TravelApp.Services.Trip/Dockerfile -t travelapp-trip:${{ github.sha }} .

      - name: Build Notification Service
        run: docker build -f ./Services/TravelApp.Services.Notification/Dockerfile -t travelapp-notification:${{ github.sha }} .

      - name: Build Gateway
        run: docker build -f ./Gateway/TravelApp.Gateway/Dockerfile -t travelapp-gateway:${{ github.sha }} .

      # ── Print a summary of all images that were built ──
      - name: List built images
        run: docker images | grep travelapp

      - name: Summary
        run: |
          echo "🚀 All Docker images built successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"